# ============================================================================
# Vol Arb UI - Nginx Configuration
# Production-optimized nginx configuration for React SPA
# ============================================================================

server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    # ==============================
    # Gzip Compression
    # ==============================
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/json
        application/javascript
        application/x-javascript
        application/xml
        application/xml+rss
        application/atom+xml
        image/svg+xml;

    # ==============================
    # Security Headers
    # ==============================
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    
    # Content Security Policy - adjust as needed for your app
    # add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; font-src 'self' data:; connect-src 'self' ws: wss:;" always;

    # ==============================
    # Caching Rules
    # ==============================
    
    # Static assets with hash in filename - long cache
    location ~* \.(?:css|js)$ {
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable";
        access_log off;
    }

    # Images and fonts - long cache
    location ~* \.(?:jpg|jpeg|png|gif|ico|svg|webp|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable";
        access_log off;
    }

    # JSON and XML - shorter cache
    location ~* \.(?:json|xml)$ {
        expires 1h;
        add_header Cache-Control "public, max-age=3600";
    }

    # HTML - no cache (for SPA routing)
    location ~* \.html$ {
        expires -1;
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0";
    }

    # ==============================
    # Health Check Endpoint
    # ==============================
    location /health {
        access_log off;
        add_header Content-Type text/plain;
        return 200 'OK';
    }

    # ==============================
    # API Proxy (if needed)
    # ==============================
    # Uncomment and configure if API is on different server
    # location /api/ {
    #     proxy_pass http://api-server:8000/;
    #     proxy_http_version 1.1;
    #     proxy_set_header Upgrade $http_upgrade;
    #     proxy_set_header Connection 'upgrade';
    #     proxy_set_header Host $host;
    #     proxy_set_header X-Real-IP $remote_addr;
    #     proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    #     proxy_set_header X-Forwarded-Proto $scheme;
    #     proxy_cache_bypass $http_upgrade;
    #     proxy_read_timeout 90s;
    #     proxy_connect_timeout 90s;
    # }

    # ==============================
    # WebSocket Proxy (if needed)
    # ==============================
    # Uncomment and configure for WebSocket support
    # location /ws/ {
    #     proxy_pass http://api-server:8000/ws/;
    #     proxy_http_version 1.1;
    #     proxy_set_header Upgrade $http_upgrade;
    #     proxy_set_header Connection "upgrade";
    #     proxy_set_header Host $host;
    #     proxy_set_header X-Real-IP $remote_addr;
    #     proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    #     proxy_read_timeout 86400;
    # }

    # ==============================
    # SPA Fallback
    # ==============================
    # All routes fallback to index.html for client-side routing
    location / {
        try_files $uri $uri/ /index.html;
        
        # Prevent caching of index.html
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0";
    }

    # ==============================
    # Error Pages
    # ==============================
    error_page 404 /index.html;
    error_page 500 502 503 504 /50x.html;
    
    location = /50x.html {
        root /usr/share/nginx/html;
    }

    # ==============================
    # Deny Access to Hidden Files
    # ==============================
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }

    # ==============================
    # Logging
    # ==============================
    access_log /var/log/nginx/access.log;
    error_log /var/log/nginx/error.log warn;
}
